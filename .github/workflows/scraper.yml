name: Job Scraper Bot
concurrency:
  group: job-scraper-bot
  cancel-in-progress: false
on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 2:00 am UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium

      - name: Run job scraper
        env:
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Optional: enable AI weather summaries. Add OPENAI_API_KEY to repository secrets to enable.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m job_scraper_bot.main --run-once

      - name: Commit output files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Job Scraper Bot"
          git config user.email "bot@example.com"
          git add -A output/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update job digest - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git pull --rebase origin master
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          fi
